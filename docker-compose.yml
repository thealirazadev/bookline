services:
  postgres:
    image: postgres:16
    container_name: bookline-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bookline
      POSTGRES_PASSWORD: bookline
      POSTGRES_DB: bookline
    ports:
      - "5432:5432"
    volumes:
      - bookline-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookline -d bookline"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: bookline-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  bookline-pgdata:
